name: Build Angular
on:
  pull_request:
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Test Angular
        run: pnpm test
